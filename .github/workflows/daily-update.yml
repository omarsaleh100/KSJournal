name: Daily Edition Publisher

on:
  schedule:
    # 6:00 AM EST (11:00 UTC) — generate all editorial content early
    - cron: '0 11 * * *'
    # 9:35 AM EST (14:35 UTC) — fetch market ticker after open, then send newsletter
    - cron: '35 14 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - content
          - ticker-and-send

jobs:
  content:
    # Run on the 6 AM schedule, or manual trigger with "content" or "all"
    if: >-
      github.event.schedule == '0 11 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'content' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > backend/service_account.json

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > backend/.env
          echo "FIREBASE_PROJECT_ID=the-ksj" >> backend/.env

      - name: Generate editorial content
        run: python backend/tasks/run_content.py

  ticker-and-send:
    # Run on the 9:35 AM schedule, or manual trigger with "ticker-and-send" or "all"
    if: >-
      github.event.schedule == '35 14 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'ticker-and-send' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > backend/service_account.json

      - name: Create .env file
        run: |
          echo "FIREBASE_PROJECT_ID=the-ksj" >> backend/.env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> backend/.env

      - name: Fetch ticker and send newsletter
        run: python backend/tasks/run_ticker_and_send.py
